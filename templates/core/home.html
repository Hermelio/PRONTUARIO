<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRONTUARIO</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7fafc;
      color: #172033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100% - 32px));
      padding: 48px;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 24px 80px rgba(23, 32, 51, 0.12);
    }

    p {
      color: #546179;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>PRONTUARIO</h1>
    <p>Esqueleto Django criado. A partir daqui vamos transformar esta base no SaaS.</p>
    <p><strong>Status:</strong> pronto para receber os proximos requisitos.</p>
  </main>
</body>
</html>
