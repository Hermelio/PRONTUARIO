<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PRONTUARIO{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --app-primary: #2457f5;
      --app-primary-dark: #1436a5;
      --app-cyan: #13c7d8;
      --app-ink: #111827;
      --app-muted: #64748b;
      --app-soft: #f4f8fb;
      --app-card: rgba(255, 255, 255, 0.88);
      --app-border: rgba(148, 163, 184, 0.24);
      --app-shadow: 0 24px 80px rgba(15, 23, 42, 0.14);
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--app-ink);
      background:
        radial-gradient(circle at top left, rgba(36, 87, 245, 0.16), transparent 34rem),
        radial-gradient(circle at top right, rgba(19, 199, 216, 0.18), transparent 30rem),
        linear-gradient(180deg, #f8fbff 0%, #eef5f9 52%, #ffffff 100%);
    }

    .navbar {
      backdrop-filter: blur(18px);
      background: rgba(255, 255, 255, 0.82);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(135deg, var(--app-primary), var(--app-cyan));
      box-shadow: 0 14px 34px rgba(36, 87, 245, 0.28);
    }

    .btn-primary {
      --bs-btn-bg: var(--app-primary);
      --bs-btn-border-color: var(--app-primary);
      --bs-btn-hover-bg: var(--app-primary-dark);
      --bs-btn-hover-border-color: var(--app-primary-dark);
      box-shadow: 0 14px 32px rgba(36, 87, 245, 0.24);
    }

    .btn {
      border-radius: 999px;
      font-weight: 700;
    }

    .section-pad {
      padding: 96px 0;
    }

    .glass-card {
      border: 1px solid var(--app-border);
      background: var(--app-card);
      box-shadow: var(--app-shadow);
      backdrop-filter: blur(18px);
      border-radius: 32px;
    }

    .soft-card {
      border: 1px solid var(--app-border);
      border-radius: 26px;
      background: #fff;
      box-shadow: 0 18px 55px rgba(15, 23, 42, 0.08);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .soft-card:hover {
      transform: translateY(-8px);
      border-color: rgba(36, 87, 245, 0.22);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.14);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .45rem .8rem;
      border: 1px solid rgba(36, 87, 245, 0.18);
      border-radius: 999px;
      color: var(--app-primary-dark);
      background: rgba(36, 87, 245, 0.08);
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .text-muted-app {
      color: var(--app-muted);
    }

    .icon-box {
      width: 50px;
      height: 50px;
      display: inline-grid;
      place-items: center;
      border-radius: 18px;
      color: var(--app-primary);
      background: rgba(36, 87, 245, 0.09);
    }

    .dashboard-panel {
      border-radius: 30px;
      color: #dbeafe;
      background:
        linear-gradient(145deg, rgba(15, 23, 42, .96), rgba(30, 58, 138, .92)),
        radial-gradient(circle at top right, rgba(19, 199, 216, .38), transparent 18rem);
      box-shadow: 0 28px 90px rgba(15, 23, 42, .28);
    }

    .mini-chart {
      height: 140px;
      display: flex;
      align-items: end;
      gap: .65rem;
    }

    .mini-chart span {
      flex: 1;
      border-radius: 999px 999px 10px 10px;
      background: linear-gradient(180deg, #67e8f9, #2457f5);
      opacity: .95;
    }

    .timeline-step {
      position: relative;
      padding-left: 3.2rem;
    }

    .timeline-step::before {
      content: attr(data-step);
      position: absolute;
      left: 0;
      top: 0;
      width: 2.25rem;
      height: 2.25rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(135deg, var(--app-primary), var(--app-cyan));
    }

    .app-footer {
      border-top: 1px solid var(--app-border);
      background: rgba(255, 255, 255, 0.72);
    }

    .floating-card {
      animation: float-card 6s ease-in-out infinite;
    }

    .floating-card:nth-child(2) {
      animation-delay: .8s;
    }

    @keyframes float-card {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s ease, transform .7s ease;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .schedule-board {
      border-radius: 30px;
      background: #fff;
      box-shadow: 0 26px 80px rgba(15, 23, 42, .12);
      overflow: hidden;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: 88px repeat(5, minmax(120px, 1fr));
      min-width: 760px;
    }

    .calendar-cell {
      min-height: 76px;
      border-right: 1px solid var(--app-border);
      border-bottom: 1px solid var(--app-border);
      padding: .85rem;
      background: #fff;
    }

    .calendar-head {
      min-height: auto;
      color: var(--app-muted);
      background: #f8fafc;
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .visit-pill {
      display: block;
      padding: .7rem .8rem;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--app-primary), #6d5dfc);
      box-shadow: 0 12px 30px rgba(36, 87, 245, .22);
      cursor: grab;
    }

    .visit-pill.alt {
      background: linear-gradient(135deg, #0f766e, var(--app-cyan));
      box-shadow: 0 12px 30px rgba(20, 184, 166, .22);
    }

    .visit-pill.warning {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      box-shadow: 0 12px 30px rgba(245, 158, 11, .22);
    }

    .gps-ring {
      position: relative;
      width: 220px;
      height: 220px;
      display: grid;
      place-items: center;
      margin: auto;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(36, 87, 245, .2) 0 24%, transparent 25%),
        radial-gradient(circle, rgba(36, 87, 245, .12) 0 48%, transparent 49%),
        radial-gradient(circle, rgba(19, 199, 216, .14) 0 72%, transparent 73%);
      border: 1px solid rgba(36, 87, 245, .16);
    }

    .gps-ring::before,
    .gps-ring::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px dashed rgba(36, 87, 245, .32);
      border-radius: 50%;
      animation: pulse-ring 2.8s ease-out infinite;
    }

    .gps-ring::after {
      inset: 42px;
      animation-delay: .7s;
    }

    @keyframes pulse-ring {
      0% { opacity: .9; transform: scale(.92); }
      100% { opacity: .08; transform: scale(1.14); }
    }

    @media (prefers-reduced-motion: reduce) {
      .floating-card,
      .gps-ring::before,
      .gps-ring::after {
        animation: none;
      }

      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top border-bottom">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center gap-3 fw800" href="/">
        <span class="brand-mark"><i class="bi bi-heart-pulse-fill"></i></span>
        <span>
          <span class="d-block fw-bold lh-1">PRONTUARIO</span>
          <small class="text-muted-app fw-semibold">Home Care OS</small>
        </span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegacao">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link fw-semibold" href="#modulos">Modulos</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="#operacao">Operacao</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="#seguranca">Seguranca</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="/dashboard/">Dashboard</a></li>
          <li class="nav-item ms-lg-2"><a class="btn btn-outline-primary px-4" href="/admin/">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="app-footer py-4">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
      <div class="fw-bold">PRONTUARIO</div>
      <div class="text-muted-app small">Plataforma para prontuario eletronico e atendimento domiciliar.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.16 });

    document.querySelectorAll('.reveal').forEach((element) => revealObserver.observe(element));
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
