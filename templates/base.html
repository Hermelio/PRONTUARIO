<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PRONTUARIO{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f8fb;
      color: #172033;
    }

    .app-shell {
      min-height: 100vh;
    }

    .hero-card {
      border: 0;
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(23, 32, 51, 0.12);
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container py-2">
        <a class="navbar-brand fw-bold" href="/">PRONTUARIO</a>
        <span class="navbar-text text-muted small">Home Care, clinicas e profissionais</span>
      </div>
    </nav>

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
